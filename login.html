<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ABCD Paulista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="loader" id="loader"><div class="loader-box"><span>ABCD</span><small>login...</small></div></div>

  <header class="header">
    <a class="logo" href="index.html"><span>ABCD</span> Paulista</a>
    <nav class="nav" id="nav">
      <a href="index.html#inicio">Início</a>
      <a href="index.html#faccoes">Facções</a>
      <a href="index.html#orgs">Orgs</a>
      <a href="painel-staff.html" class="staff-link">PAINEL-STAFF</a>
      <a href="login.html" class="login-link">Login</a>
      <button class="logout-btn" id="logoutBtn" type="button">Sair</button>
      <a href="assumir.html" class="nav-btn">Assumir</a>
    </nav>
    <button class="menu" id="menu" aria-label="Abrir menu">☰</button>
  </header>

  <main>
    <section class="section apply-page">
      <div class="section-title reveal">
        <p class="tag">Área de login</p>
        <h2>Entrar no sistema</h2>
        <p class="desc small-center">Acesso reservado para staff.</p>
      </div>

      <article class="category login-card reveal">
        <div class="category-head">
          <h3>Login com senha</h3>
          <span class="badge">Staff</span>
        </div>
        <form class="form" id="loginForm">
          <label>Senha
            <input type="password" id="senha" placeholder="Digite a senha" required>
          </label>
          <button class="btn primary full" type="submit">ENTRAR</button>
          <button class="btn ghost full" type="button" id="sair">SAIR DA CONTA</button>
          <p class="form-note" id="loginMsg"></p>
        </form>
      </article>
    </section>
  </main>

  <footer><p>ABCD Paulista © 2026 — Login</p></footer>
  <script src="script.js"></script>
  <script src="login.js"></script>
</body>
</html>
